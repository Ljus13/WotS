<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysian Stamp 2026</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Kanit:wght@200;300;400;600&display=swap');
        
        :root {
            --forest-green: #1b4d3e;
            --wood-brown: #7c4a32;
            --cream-bg: #fdfcf0;
            --border-color: #d4cfb0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--cream-bg);
            background-image: radial-gradient(#e5e1c5 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            color: var(--forest-green);
        }

        .font-serif-elegant {
            font-family: 'Playfair Display', serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
        }

        [v-cloak] { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="app" class="max-w-5xl mx-auto p-4 md:p-10" v-cloak>
        <!-- Header Section -->
        <header class="text-center mb-12">
            <div class="inline-block relative">
                <h1 class="text-5xl md:text-6xl font-serif-elegant font-bold text-[#1b4d3e] tracking-tight mb-2">
                    Elystamps
                </h1>
                <div class="h-px bg-[#1b4d3e] w-full opacity-30"></div>
                <p class="text-sm md:text-base font-serif-elegant italic text-slate-500 mt-2 tracking-[0.2em] uppercase">
                    RoleplayTH • 2026 Collection
                </p>
            </div>
        </header>

        <!-- Search & Interaction -->
        <div class="max-w-2xl mx-auto mb-12 relative z-10">
            <div class="glass-card rounded-[2rem] p-8 shadow-sm">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-8 h-8 rounded-full bg-[#1b4d3e] flex items-center justify-center text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <label class="text-xs font-semibold uppercase tracking-widest text-slate-500">ค้นหาชื่อสมาชิก</label>
                </div>
                
                <div class="relative">
                    <input 
                        type="text" 
                        v-model="searchQuery"
                        @focus="showDropdown = true"
                        placeholder="พิมพ์ชื่อเพื่อระบุตัวตน..." 
                        class="w-full px-6 py-4 rounded-2xl bg-white/80 border border-[#d4cfb0] focus:ring-2 focus:ring-[#1b4d3e] focus:border-transparent transition-all text-xl outline-none"
                    >
                    
                    <!-- Dropdown Selection -->
                    <transition name="fade">
                        <div v-if="showDropdown && filteredMembers.length > 0" 
                             class="absolute left-0 right-0 mt-3 bg-white border border-[#d4cfb0] rounded-2xl shadow-2xl z-50 overflow-hidden custom-scrollbar max-h-64">
                            <div 
                                v-for="member in filteredMembers" 
                                :key="member.name"
                                @click="selectMember(member)"
                                class="px-6 py-4 hover:bg-[#f3f4e9] cursor-pointer border-b border-[#f3f4e9] last:border-0 transition-colors flex justify-between items-center group"
                            >
                                <span class="font-medium text-[#1b4d3e] group-hover:translate-x-1 transition-transform">{{ member.name }}</span>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#d4cfb0]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                </svg>
                            </div>
                        </div>
                    </transition>
                </div>

                <div class="mt-4 flex items-center justify-between text-xs text-slate-400">
                    <div v-if="isLoading" class="flex items-center space-x-1">
                        <svg class="animate-spin h-3 w-3" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        <span class="tracking-tighter">กำลังดึงข้อมูลสมาชิก...</span>
                    </div>
                    <div v-else-if="lastUpdated" class="flex items-center space-x-1 opacity-60">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        <span>sync ข้อมูลล่าสุด {{ lastUpdated.toLocaleTimeString('th-TH') }}</span>
                    </div>
                    <div v-else class="opacity-40">รอเชื่อมต่อ...</div>

                    <!-- ปุ่มรีเฟรชด้วยตัวเอง -->
                    <button
                        @click="fetchData()"
                        :disabled="isLoading"
                        class="flex items-center space-x-1 px-3 py-1.5 rounded-lg border border-[#d4cfb0] hover:bg-[#f3f4e9] hover:border-[#1b4d3e] disabled:opacity-40 disabled:cursor-not-allowed transition-all"
                        title="รีเฟรชข้อมูลจาก Google Sheets ทันที"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" :class="['h-3 w-3 text-[#1b4d3e]', isLoading ? 'animate-spin' : '']" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        <span class="text-[#1b4d3e] font-medium">รีเฟรช</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Card Preview Section -->
        <transition name="fade">
            <div v-if="selectedMember" class="space-y-10">
                <div class="relative group">
                    <!-- Subtle Frame Decoration -->
                    <div class="absolute -inset-4 border border-[#d4cfb0] rounded-[0.75rem] pointer-events-none opacity-40"></div>
                    
                    <div class="bg-[#1b4d3e] p-2 md:p-4 rounded-[0.5rem] shadow-2xl overflow-hidden flex justify-center items-center">
                        <!-- Preview ใช้ canvas แทน SVG+image: browser เห็นแค่ pixel ไม่มี <img> ให้ right-click save -->
                        <canvas
                            ref="previewCanvas"
                            width="1024"
                            height="572"
                            @contextmenu.prevent
                            class="w-full h-auto block rounded-[0.5rem]"
                            style="aspect-ratio: 1024 / 572;"
                        ></canvas>
                    </div>
                </div>

                <!-- Export Button Section -->
                <div class="flex flex-col items-center pb-20">
                    <button 
                        @click="exportImage" 
                        :disabled="isExporting"
                        class="group relative bg-[#1b4d3e] hover:bg-[#2a5a4b] disabled:bg-slate-300 text-white px-12 py-5 rounded-2xl font-semibold transition-all shadow-xl hover:-translate-y-1 flex items-center space-x-4 overflow-hidden"
                    >
                        <!-- Wood Texture Overlay Effect -->
                        <div class="absolute inset-0 opacity-10 pointer-events-none mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/wood-pattern.png')]"></div>
                        
                        <span v-if="isExporting" class="flex items-center">
                            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            กำลังประมวลผลรูปภาพ...
                        </span>
                        <template v-else>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#d4cfb0]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            <span class="text-xl tracking-wide uppercase font-serif-elegant">SAVE STAMP CARD</span>
                        </template>
                    </button>
                    <p class="mt-4 text-xs text-slate-400 font-light italic">บันทึกเป็นไฟล์ PNG</p>
                </div>
            </div>
        </transition>

        <!-- Empty State -->
        <transition name="fade">
            <div v-if="!selectedMember" class="text-center py-32 rounded-[3rem] border-2 border-dashed border-[#d4cfb0]">
                <div class="text-[#d4cfb0] mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </div>
                <p class="text-[#1b4d3e] text-xl font-serif-elegant italic opacity-60">"เข้าร่วมเทศกาลและกิจกรรมต่าง ๆ ที่กำหนด เพื่อรับแสตมป์"</p>
            </div>
        </transition>
    </div>

    <script>
        const { createApp, ref, computed, watch, nextTick, onMounted, onUnmounted } = Vue;

        // URL แบบ CSV เท่านั้นจาก Google Sheets (ต้องตั้งเป็น "เผยแพร่ในเว็บ" และเลือก "CSV" ในตัวเลือกการเผยแพร่)
        // คอลั่ม ให้ตั้งชื่อเป็น: name, card_url, s1, s2, s3, s4, s5 (s1-s5 คือสถานะแสตมป์แต่ละดวง: "1" = ได้รับแสตมป์, "0" = ไม่ได้รับ)
        // หากต้องการเปลี่ยนชื่อคอลั่ม จะต้องเปลี่ยนตัวแปรใน Javascript ด้วย (เช่น member.name, member.card_url, member.s1 เป็นต้น)

        createApp({
            setup() {
                const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyxgT8UJw7mwUlr72DpWghax5VIhbHTh4U77w6VD6jsjLK3pYt9db39Eie0owsaovByFouh8KVP7E6/pub?output=csv';
                // แท็บ stamp_url: คอลั่ม stamp_no (1-5) และ stamp_url
                const STAMP_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQyxgT8UJw7mwUlr72DpWghax5VIhbHTh4U77w6VD6jsjLK3pYt9db39Eie0owsaovByFouh8KVP7E6/pub?output=csv&sheet=stamp_url';

                // โหลด URL แสตมป์จากชีต stamp_url (เรียงตาม stamp_no)
                const stampImages = ref([]);
                
                // ============================================================
                // แก้ตำแหน่งแสตมป์ทั้ง 5 ดวง: (x, y) คือศูนย์กลางของแต่ละดวง
                // canvas ขนาด 1024 x 572 px  |  แสตมป์วาดจาก (x-70, y-70) ขนาด 140x140
                // หากไม่แน่ใจตำแหน่งที่จะแก้ไข ให้เปิดในโปรแกรมที่สามารถระบุพิกัด x, y ได้
                //
                //   ดวงที่ 1 (s1): { x: ..., y: ... }  ← ซ้ายสุด
                //   ดวงที่ 2 (s2): { x: ..., y: ... }
                //   ดวงที่ 3 (s3): { x: ..., y: ... }  ← กลาง
                //   ดวงที่ 4 (s4): { x: ..., y: ... }
                //   ดวงที่ 5 (s5): { x: ..., y: ... }  ← ขวาสุด
                //
                // หมายเหตุ: ค่า s1-s5 ในชีตต้องเป็น "1" ถึงจะแสดงแสตมป์ดวงนั้น
                // ============================================================
                const stampPositions = [
                    { x: 170.9568, y: 367.1727 },  // ดวงที่ 1 (s1)
                    { x: 340.8561, y: 430.8849 },  // ดวงที่ 2 (s2)
                    { x: 512,      y: 367.1727 },  // ดวงที่ 3 (s3)
                    { x: 683.1439, y: 430.8849 },  // ดวงที่ 4 (s4)
                    { x: 854.2878, y: 367.1727 }   // ดวงที่ 5 (s5)
                ];

                const members = ref([]);
                const searchQuery = ref('');
                const selectedMember = ref(null);
                const isLoading = ref(false);
                const showDropdown = ref(false);
                const isExporting = ref(false);
                const lastUpdated = ref(null);
                let pollInterval = null;

                // แยก CSV อย่างถูกต้อง: รองรับ CRLF, quoted fields ที่มีคอมมาหรือ newline
                const parseCSV = (text) => {
                    const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                    const rows = [];
                    let cur = '', inQuote = false, row = [];
                    for (let i = 0; i < normalized.length; i++) {
                        const ch = normalized[i];
                        if (ch === '"') { inQuote = !inQuote; }
                        else if (ch === ',' && !inQuote) { row.push(cur.trim()); cur = ''; }
                        else if (ch === '\n' && !inQuote) { row.push(cur.trim()); rows.push(row); row = []; cur = ''; }
                        else { cur += ch; }
                    }
                    if (cur || row.length) { row.push(cur.trim()); rows.push(row); }

                    const headers = rows[0];
                    return rows.slice(1).filter(r => r.some(v => v)).map(values => {
                        const obj = {};
                        headers.forEach((h, i) => obj[h] = values[i] || '');
                        return obj;
                    });
                };

                const fetchStampData = async () => {
                    try {
                        const url = STAMP_URL + '&_cb=' + Date.now();
                        const response = await fetch(url, { cache: 'no-store' });
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        const csvText = await response.text();
                        const rows = parseCSV(csvText);
                        stampImages.value = rows
                            .sort((a, b) => Number(a.stamp_no) - Number(b.stamp_no))
                            .map(r => r.stamp_url);
                    } catch (error) {
                        console.error('Stamp URL Fetch Error:', error);
                    }
                };

                const fetchData = async (silent = false) => {
                    if (!silent) isLoading.value = true;
                    try {
                        // cache-bust ทุกครั้งที่ fetch เพื่อไม่ให้ browser cache CSV เก่า
                        const url = CSV_URL + '&_cb=' + Date.now();
                        const response = await fetch(url, { cache: 'no-store' });
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        const csvText = await response.text();
                        const newData = parseCSV(csvText);
                        members.value = newData;
                        lastUpdated.value = new Date();

                        // ถ้ากำลังแสดงสมาชิกอยู่ ให้ sync ข้อมูลใหม่ทันที (ไม่ trigger animation ซ้ำ)
                        if (selectedMember.value) {
                            const refreshed = newData.find(m => m.name === selectedMember.value.name);
                            if (refreshed) selectedMember.value = refreshed;
                        }
                    } catch (error) {
                        console.error('Data Fetch Error:', error);
                    } finally {
                        isLoading.value = false;
                    }
                };

                const filteredMembers = computed(() => {
                    if (!searchQuery.value) return [];
                    const q = searchQuery.value.toLowerCase();
                    return members.value.filter(m => m.name.toLowerCase().includes(q)).slice(0, 10);
                });

                const selectMember = (member) => {
                    selectedMember.value = null; // Reset for animation
                    setTimeout(() => {
                        selectedMember.value = member;
                        searchQuery.value = member.name;
                        showDropdown.value = false;
                    }, 100);
                };

                const shouldShowStamp = (index) => {
                    if (!selectedMember.value) return false;
                    return selectedMember.value[`s${index + 1}`] == "1";
                };

                const previewCanvas = ref(null);

                // ฟังก์ชันวาดการ์ด (static): ใช้สำหรับ export
                const drawCard = async (ctx) => {
                    ctx.clearRect(0, 0, 1024, 572);
                    const bgImg = await loadImage(selectedMember.value.card_url);
                    ctx.drawImage(bgImg, 0, 0, 1024, 572);
                    await Promise.all(stampPositions.map(async (pos, index) => {
                        if (shouldShowStamp(index)) {
                            const stampImg = await loadImage(stampImages.value[index]);
                            ctx.drawImage(stampImg, pos.x - 70, pos.y - 70, 140, 140);
                        }
                    }));
                };

                // วาด preview พร้อม animation ประทับแสตมป์ทีละดวง
                // เอฟเฟกต์: fade + zoom-out (scale 1.8 → 1.0) เหมือนประทับจริง
                const drawPreview = async () => {
                    if (!selectedMember.value) return;
                    await nextTick();
                    if (!previewCanvas.value) return;
                    const ctx = previewCanvas.value.getContext('2d');
                    try {
                        // โหลดรูปทั้งหมดก่อนเริ่ม animation
                        const bgImg = await loadImage(selectedMember.value.card_url);
                        const activeStamps = [];
                        for (let i = 0; i < stampPositions.length; i++) {
                            if (shouldShowStamp(i)) {
                                const img = await loadImage(stampImages.value[i]);
                                activeStamps.push({ img, pos: stampPositions[i] });
                            }
                        }

                        // วาด background ก่อน
                        ctx.clearRect(0, 0, 1024, 572);
                        ctx.drawImage(bgImg, 0, 0, 1024, 572);

                        // animate แสตมป์ทีละดวง แบบโดมิโน่: ดวงถัดไปเริ่มตอนดวงก่อนผ่านครึ่งทาง
                        const DURATION    = 480;          // ms ต่อดวง
                        const OVERLAP     = DURATION / 2; // ดวงถัดไปเริ่มตอนดวงก่อน = 50%
                        const SCALE_START = 1.75;

                        // คำนวณเวลาเริ่มของแต่ละดวงล่วงหน้า (relative ต่อ t0)
                        const stampStartOffsets = activeStamps.map((_, i) => i * OVERLAP);
                        const totalDuration = stampStartOffsets[activeStamps.length - 1] + DURATION;

                        await new Promise(resolve => {
                            let t0 = null; // จับ t0 จาก frame แรกที่วิ่งจริง
                            const tick = (now) => {
                                if (t0 === null) t0 = now;
                                const elapsed = now - t0;

                                ctx.clearRect(0, 0, 1024, 572);
                                ctx.drawImage(bgImg, 0, 0, 1024, 572);

                                for (let i = 0; i < activeStamps.length; i++) {
                                    const localElapsed = elapsed - stampStartOffsets[i];
                                    if (localElapsed < 0) continue; // ยังไม่ถึงเวลา
                                    const t     = Math.min(localElapsed / DURATION, 1);
                                    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
                                    ctx.save();
                                    ctx.globalAlpha = eased;
                                    ctx.translate(activeStamps[i].pos.x, activeStamps[i].pos.y);
                                    ctx.scale(SCALE_START - (SCALE_START - 1) * eased, SCALE_START - (SCALE_START - 1) * eased);
                                    ctx.drawImage(activeStamps[i].img, -70, -70, 140, 140);
                                    ctx.restore();
                                }

                                if (elapsed < totalDuration) requestAnimationFrame(tick);
                                else resolve();
                            };
                            requestAnimationFrame(tick);
                        });
                    } catch (e) { console.error('Preview draw error:', e); }
                };

                watch(selectedMember, drawPreview);

                const loadImage = (src) => new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => resolve(img);
                    img.onerror = () => {
                        // Fallback: try without crossOrigin (for non-CORS sources)
                        const img2 = new Image();
                        img2.onload = () => resolve(img2);
                        img2.onerror = reject;
                        img2.src = src + (src.includes('?') ? '&' : '?') + '_t=' + Date.now();
                    };
                    img.src = src;
                });

                const exportImage = async () => {
                    isExporting.value = true;
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = 1024;
                        canvas.height = 572;
                        const ctx = canvas.getContext('2d');
                        await drawCard(ctx);
                        const link = document.createElement('a');
                        link.download = `ElysianCard_${selectedMember.value.name}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (err) {
                        console.error('Export Failed:', err);
                        alert('เกิดข้อผิดพลาดในการบันทึกรูปภาพ กรุณาลองใหม่อีกครั้ง');
                    } finally {
                        isExporting.value = false;
                    }
                };

                onMounted(() => {
                    fetchData();
                    fetchStampData();
                    // polling ทุก 30 วินาที เพื่อรับข้อมูลใหม่จาก Google Sheets
                    // (Google Sheets ใช้เวลา ~1-5 นาทีกว่าจะ publish อัปเดต ฝั่งนี้พร้อมรับทันที)
                    pollInterval = setInterval(() => fetchData(true), 30000);
                });

                onUnmounted(() => clearInterval(pollInterval));

                // Close dropdown on click outside
                window.addEventListener('click', (e) => {
                    if (!e.target.closest('.relative')) showDropdown.value = false;
                });

                return {
                    searchQuery,
                    filteredMembers,
                    selectedMember,
                    isLoading,
                    showDropdown,
                    isExporting,
                    lastUpdated,
                    previewCanvas,
                    stampPositions,
                    stampImages,
                    selectMember,
                    shouldShowStamp,
                    exportImage
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
