<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สารานุกรมสมุนไพรวิเศษ (Magical Herbs Encyclopedia)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #0b1611;
            color: #e8e4d9;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Custom Scrollbar for Vintage Dark Theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(11, 22, 17, 0.5); 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4a5e52; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #c2a36d; 
        }

        /* Simple Fade In Animation */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-anim {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body>

    <!-- Header - Dark Vintage Style -->
    <div class="w-full bg-[#0b1611] border-b border-[#c2a36d]/30 px-6 py-8 md:px-12 sticky top-0 z-50">
        <div class="w-full mx-auto flex flex-col md:flex-row md:items-center justify-between gap-6">
            
            <!-- Logo & Title -->
            <div class="flex items-center gap-5">
                <div class="p-3 border-2 border-[#c2a36d] rounded-full flex items-center justify-center">
                    <i data-lucide="leaf" class="w-8 h-8 text-[#c2a36d]"></i>
                </div>
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold text-[#e8e4d9] tracking-wide mb-1">สารานุกรมสมุนไพรวิเศษ</h1>
                    <p class="text-[#a59a85] text-lg font-light">รวบรวมพืชพรรณเวทมนตร์จากทั่วทุกมุมโลก</p>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div class="relative w-full md:w-[400px]">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="search" class="h-5 w-5 text-[#8b8270]"></i>
                </div>
                <input
                    type="text"
                    id="searchInput"
                    class="block w-full pl-12 pr-4 py-3 rounded-full border border-[#c2a36d]/40 bg-[#16271f] text-[#e8e4d9] placeholder-[#8b8270] focus:outline-none focus:border-[#c2a36d] transition-colors"
                    placeholder="ค้นหาชื่อพืช, คุณสมบัติ, ตำนาน..."
                />
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="w-full p-4 md:p-8 lg:p-12 relative min-h-[60vh]">
        
        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center text-[#c2a36d] pulse-anim py-20">
            <i data-lucide="sparkles" class="w-16 h-16 mb-4"></i>
            <h2 class="text-3xl font-bold tracking-wider">กำลังเปิดตำราเวทมนตร์โบราณ...</h2>
        </div>

        <!-- View Containers -->
        <div id="index-view" class="max-w-7xl mx-auto hidden fade-in"></div>
        <div id="detail-view" class="max-w-7xl mx-auto hidden fade-in"></div>

    </div>

    <!-- Script Application Logic -->
    <script>
        // Data State
        let allPlants = [];
        let searchTerm = '';
        let selectedPlant = null;

        // Constants
        const DEFAULT_IMG = "https://images.unsplash.com/photo-1635398282361-b1e15e8df1a0?auto=format&fit=crop&q=80&w=1000";
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQvRgMgqr0TlvEpatJF7dAn-3SB77GXQe8MDYLSTQA1QDQG6PvmfViNtEdg7bQHnTBZ9jqZKGneXqn/pub?gid=0&single=true&output=csv';

        // Initialize App
        async function initApp() {
            lucide.createIcons();
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                
                const parsedData = parseCSV(csvText);
                if (parsedData.length > 0) {
                    const headers = parsedData[0].map(h => h.trim());
                    allPlants = parsedData.slice(1).map(row => {
                        let obj = {};
                        headers.forEach((h, i) => {
                            obj[h] = row[i] ? row[i].trim() : '';
                        });
                        return obj;
                    }).filter(item => item.name_official || item.name_th);
                }
                render();
            } catch (error) {
                console.error("Error fetching or parsing CSV:", error);
                document.getElementById('loader').innerHTML = `<div class="text-red-500">เกิดข้อผิดพลาดในการโหลดตำราเวทมนตร์</div>`;
            }
        }

        // Search Listener
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            selectedPlant = null; // Reset view to index if searching
            render();
        });

        // Global functions for inline HTML event handlers
        window.selectPlant = function(index) {
            // Need to get the actual plant from allPlants, not the filtered one
            selectedPlant = allPlants[index];
            window.scrollTo({ top: 0, behavior: 'smooth' });
            render();
        };

        window.backToIndex = function() {
            selectedPlant = null;
            render();
        };

        // Render Controller
        function render() {
            const loader = document.getElementById('loader');
            const indexView = document.getElementById('index-view');
            const detailView = document.getElementById('detail-view');

            if (allPlants.length === 0) {
                loader.style.display = 'flex';
                indexView.style.display = 'none';
                detailView.style.display = 'none';
                return;
            }

            loader.style.display = 'none';

            if (selectedPlant) {
                indexView.style.display = 'none';
                detailView.style.display = 'block';
                detailView.innerHTML = generateDetailHTML(selectedPlant);
            } else {
                detailView.style.display = 'none';
                indexView.style.display = 'block';
                indexView.innerHTML = generateIndexHTML();
            }
            
            // Re-initialize icons for newly added DOM elements
            lucide.createIcons();
        }

        // HTML Generators
        function generateIndexHTML() {
            // Filter and sort data
            let filtered = allPlants.filter(item => 
                (item.name_th && item.name_th.toLowerCase().includes(searchTerm.toLowerCase())) ||
                (item.name_official && item.name_official.toLowerCase().includes(searchTerm.toLowerCase())) ||
                (item.magical_properties && item.magical_properties.toLowerCase().includes(searchTerm.toLowerCase()))
            );
            
            filtered.sort((a, b) => (a.name_th || '').localeCompare(b.name_th || '', 'th'));

            if (filtered.length === 0) {
                return `
                    <div class="text-center py-32 text-[#8b8270] text-2xl">
                        <i data-lucide="search" class="w-20 h-20 mx-auto mb-6 text-[#4a5850]"></i>
                        ไม่มีบันทึกพืชวิเศษที่คุณค้นหาในตำรานี้
                    </div>
                `;
            }

            let cardsHtml = filtered.map(plant => {
                const originalIndex = allPlants.indexOf(plant);
                const imageUrl = plant.url || DEFAULT_IMG;
                
                let tierBadge = '';
                if (plant.tier) {
                    tierBadge = `
                        <div class="absolute top-2 right-2 bg-[#0b1611]/80 border border-[#c2a36d] text-[#c2a36d] text-xs px-2 py-1 rounded-full flex items-center gap-1 backdrop-blur-sm">
                            <i data-lucide="star" fill="#c2a36d" class="w-3 h-3 text-[#c2a36d]"></i>
                            ${escapeHTML(plant.tier)}
                        </div>
                    `;
                }

                return `
                    <div onclick="selectPlant(${originalIndex})" class="group cursor-pointer bg-[#16271f] border border-[#c2a36d]/30 rounded-sm overflow-hidden hover:border-[#c2a36d] hover:shadow-[0_0_15px_rgba(194,163,109,0.2)] transition-all duration-300 flex flex-col h-full">
                        <div class="w-full h-40 md:h-48 overflow-hidden relative shrink-0">
                            <img 
                                src="${imageUrl}" 
                                alt="${escapeHTML(plant.name_th)}"
                                class="w-full h-full object-cover filter brightness-90 group-hover:scale-110 group-hover:brightness-100 transition-all duration-700"
                                onerror="this.src='${DEFAULT_IMG}'"
                            />
                            ${tierBadge}
                        </div>
                        <div class="p-4 text-center flex-grow flex flex-col justify-center bg-[#0b1611]/40 group-hover:bg-[#0b1611]/80 transition-colors">
                            <h3 class="text-[#e8e4d9] font-bold text-lg md:text-xl line-clamp-2 group-hover:text-[#c2a36d] transition-colors">${escapeHTML(plant.name_th)}</h3>
                            <p class="text-[#a59a85] text-sm italic line-clamp-1 font-serif mt-1">${escapeHTML(plant.name_official)}</p>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="flex items-center gap-4 mb-8 border-b border-[#c2a36d]/30 pb-4">
                    <i data-lucide="moon" class="w-8 h-8 text-[#c2a36d]"></i>
                    <h2 class="text-3xl md:text-4xl font-bold text-[#e8e4d9] tracking-wide">สารบัญพืชวิเศษ</h2>
                    <span class="text-[#8b8270] text-lg ml-auto hidden md:inline-block">${filtered.length} รายการ (เรียง ก-ฮ)</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                    ${cardsHtml}
                </div>
            `;
        }

        function generateDetailHTML(plant) {
            const imageUrl = plant.url || DEFAULT_IMG;

            let badgesHtml = '';
            if (plant.elements) {
                badgesHtml += `
                    <div class="flex items-center gap-2 border border-[#528a7e] text-[#7dc0b2] px-4 py-2 rounded-lg bg-[#11241f]">
                        <i data-lucide="wind" class="w-5 h-5"></i>
                        <span class="text-lg">ธาตุ: ${escapeHTML(plant.elements)}</span>
                    </div>
                `;
            }
            if (plant.symbol) {
                badgesHtml += `
                    <div class="flex items-center gap-2 border border-[#7a5c8c] text-[#b48bd4] px-4 py-2 rounded-lg bg-[#1f1624]">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                        <span class="text-lg">${escapeHTML(plant.symbol)}</span>
                    </div>
                `;
            }

            let tierHtml = '';
            if (plant.tier) {
                tierHtml = `
                    <div class="inline-flex items-center gap-2 border border-[#c2a36d] text-[#c2a36d] px-4 py-1.5 rounded-full text-base font-medium mb-6 w-fit bg-[#c2a36d]/10 shrink-0">
                        <i data-lucide="star" fill="#c2a36d" class="w-4 h-4 text-[#c2a36d]"></i>
                        ระดับหายาก: ${escapeHTML(plant.tier)}
                    </div>
                `;
            }

            let bewareHtml = '';
            if (plant.beware) {
                bewareHtml = `
                    <div class="mt-6 bg-[#e0cdca] border border-[#a8655e] p-6 rounded-sm flex flex-col sm:flex-row gap-6 items-start shadow-inner">
                        <div class="shrink-0 text-[#8b2b22] pt-1">
                            <i data-lucide="shield-alert" class="w-14 h-14"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-bold text-[#8b2b22] mb-2">ข้อควรระวังอันตราย!</h3>
                            <p class="text-[#4a1c17] text-xl leading-relaxed">${escapeHTML(plant.beware)}</p>
                        </div>
                    </div>
                `;
            }

            // Grid Items
            let gridHtml = '';
            if (plant.appearance) {
                gridHtml += `
                    <div class="bg-[#e6d7c3] p-2.5 rounded-sm shadow-lg h-full">
                        <div class="border-2 border-[#c2a680] h-full p-6 sm:p-8 flex flex-col">
                            <h3 class="flex items-center gap-3 text-2xl font-bold text-[#4a3a2a] mb-4 border-b-2 border-[#c2a680]/60 pb-3 shrink-0">
                                <div class="bg-[#6b5842] p-2 rounded-full shadow-inner"><i data-lucide="leaf" class="w-6 h-6 text-[#e6d7c3]"></i></div>
                                ลักษณะทางพฤกษศาสตร์
                            </h3>
                            <p class="text-[#5a4a3a] text-xl leading-relaxed">${escapeHTML(plant.appearance)}</p>
                        </div>
                    </div>
                `;
            }
            if (plant.harvest) {
                gridHtml += `
                    <div class="bg-[#e6d7c3] p-2.5 rounded-sm shadow-lg h-full">
                        <div class="border-2 border-[#c2a680] h-full p-6 sm:p-8 flex flex-col">
                            <h3 class="flex items-center gap-3 text-2xl font-bold text-[#4a3a2a] mb-4 border-b-2 border-[#c2a680]/60 pb-3 shrink-0">
                                <div class="bg-[#8b7355] p-2 rounded-full shadow-inner"><i data-lucide="scissors" class="w-6 h-6 text-[#e6d7c3]"></i></div>
                                การเก็บเกี่ยว
                            </h3>
                            <p class="text-[#5a4a3a] text-xl leading-relaxed">${escapeHTML(plant.harvest)}</p>
                        </div>
                    </div>
                `;
            }
            if (plant.legend) {
                gridHtml += `
                    <div class="bg-[#e6d7c3] p-2.5 rounded-sm shadow-lg h-full">
                        <div class="border-2 border-[#c2a680] h-full p-6 sm:p-8 flex flex-col">
                            <h3 class="flex items-center gap-3 text-2xl font-bold text-[#4a3a2a] mb-4 border-b-2 border-[#c2a680]/60 pb-3 shrink-0">
                                <div class="bg-[#3b2d4a] p-2 rounded-full shadow-inner"><i data-lucide="moon" class="w-6 h-6 text-[#e6d7c3]"></i></div>
                                ตำนานและความเป็นมา
                            </h3>
                            <p class="text-[#5a4a3a] text-xl leading-relaxed">${escapeHTML(plant.legend)}</p>
                        </div>
                    </div>
                `;
            }
            if (plant.fact) {
                gridHtml += `
                    <div class="bg-[#e6d7c3] p-2.5 rounded-sm shadow-lg h-full">
                        <div class="border-2 border-[#c2a680] h-full p-6 sm:p-8 flex flex-col">
                            <h3 class="flex items-center gap-3 text-2xl font-bold text-[#4a3a2a] mb-4 border-b-2 border-[#c2a680]/60 pb-3 shrink-0">
                                <div class="bg-[#4b5a63] p-2 rounded-full shadow-inner"><i data-lucide="info" class="w-6 h-6 text-[#e6d7c3]"></i></div>
                                ข้อควรรู้เพิ่มเติม
                            </h3>
                            <p class="text-[#5a4a3a] text-xl leading-relaxed">${escapeHTML(plant.fact)}</p>
                        </div>
                    </div>
                `;
            }

            return `
                <button onclick="backToIndex()" class="mb-8 flex items-center gap-2 text-[#c2a36d] hover:text-[#e8e4d9] transition-colors bg-[#16271f] px-5 py-2.5 rounded-full border border-[#c2a36d]/30 w-fit hover:border-[#c2a36d]">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    <span class="font-bold text-lg tracking-wide">กลับสารบัญพืชวิเศษ</span>
                </button>
                
                <div class="w-full border-2 border-[#c2a36d]/40 p-4 md:p-10 rounded-sm relative overflow-hidden">
                    
                    <!-- Decorative corners -->
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-[#c2a36d]"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-[#c2a36d]"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-[#c2a36d]"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-[#c2a36d]"></div>

                    <!-- Hero Section -->
                    <div class="flex flex-col lg:flex-row gap-10 lg:gap-16 lg:h-[550px]">
                        
                        <!-- Left: Text -->
                        <div class="w-full lg:w-1/2 flex flex-col overflow-y-auto custom-scrollbar pr-4 pb-4">
                            ${tierHtml}
                            <h2 class="text-5xl md:text-6xl font-bold mb-3 text-[#e8e4d9] tracking-tight shrink-0">${escapeHTML(plant.name_th)}</h2>
                            <p class="text-3xl italic text-[#c2a36d] mb-8 font-serif shrink-0">${escapeHTML(plant.name_official)}</p>
                            
                            <p class="text-[#d5d0c3] text-xl leading-relaxed mb-10 shrink-0">
                                ${escapeHTML(plant.magical_properties || 'ไม่ปรากฏคุณสมบัติทางเวทมนตร์ที่แน่ชัดในบันทึก')}
                            </p>
                            
                            <div class="flex flex-wrap gap-4 mt-auto shrink-0 pt-4">
                                ${badgesHtml}
                            </div>
                        </div>

                        <!-- Right: Image -->
                        <div class="w-full lg:w-1/2 relative shrink-0 h-[400px] lg:h-full">
                            <div class="p-2 border-2 border-double border-[#c2a36d] rounded-sm bg-[#0b1611] h-full">
                                <img 
                                    src="${imageUrl}" 
                                    alt="${escapeHTML(plant.name_th)}" 
                                    class="w-full h-full object-cover filter brightness-90 contrast-110"
                                    onerror="this.src='${DEFAULT_IMG}'"
                                />
                            </div>
                        </div>
                    </div>

                    <!-- Stats Banner -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-[#e4decb] rounded-sm p-6 mt-12 shadow-inner border border-[#c2a36d]/50">
                        <div class="flex items-start gap-4">
                            <div class="p-3 bg-[#1c2e24] text-[#c2a36d] rounded-full shrink-0"><i data-lucide="sun" class="w-8 h-8"></i></div>
                            <div>
                                <p class="text-sm font-bold text-[#5c6e62] mb-1">แสงแดด</p>
                                <p class="text-[#1a251e] text-lg leading-snug">${escapeHTML(plant.sun || '-')}</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4 border-t md:border-t-0 md:border-l border-[#c4bba4] pt-4 md:pt-0 md:pl-6">
                            <div class="p-3 bg-[#1c2e24] text-[#7dc0b2] rounded-full shrink-0"><i data-lucide="droplets" class="w-8 h-8"></i></div>
                            <div>
                                <p class="text-sm font-bold text-[#5c6e62] mb-1">ปริมาณน้ำ</p>
                                <p class="text-[#1a251e] text-lg leading-snug">${escapeHTML(plant.water || '-')}</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4 border-t md:border-t-0 md:border-l border-[#c4bba4] pt-4 md:pt-0 md:pl-6">
                            <div class="p-3 bg-[#1c2e24] text-[#d4b48b] rounded-full shrink-0"><i data-lucide="clock" class="w-8 h-8"></i></div>
                            <div>
                                <p class="text-sm font-bold text-[#5c6e62] mb-1">ระยะเวลาเติบโต</p>
                                <p class="text-[#1a251e] text-lg leading-snug">${escapeHTML(plant.growth_duration || '-')}</p>
                            </div>
                        </div>
                    </div>

                    ${bewareHtml}

                    <!-- 2x2 Details Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                        ${gridHtml}
                    </div>

                    <!-- Footer Decoration -->
                    <div class="mt-12 text-center flex items-center justify-center gap-4 text-[#c2a36d]">
                        <span class="w-12 border-t border-[#c2a36d]/50"></span>
                        <i data-lucide="leaf" class="w-5 h-5"></i>
                        <span class="text-lg italic font-light tracking-wider">ธรรมชาติคือเวทมนตร์ที่เก่าแก่ที่สุด</span>
                        <i data-lucide="leaf" class="w-5 h-5"></i>
                        <span class="w-12 border-t border-[#c2a36d]/50"></span>
                    </div>

                </div>
            `;
        }

        // CSV Parser Utility
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c + 1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        // HTML Escaper for Safety
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Boot
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
